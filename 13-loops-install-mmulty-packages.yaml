- name: install and uninstall multy packages
  hosts: web
  become: yes
  tasks:
  - name: install multiple packages
    ansible.builtin.dnf:
      name: " {{ item.name }} "
      state: " {{ item.state }} "
    loop:
    - { name: 'mysql', state: 'installed' }
    - { name: 'nginx', state: 'installed' }
    - { name: 'postfix', state: 'installed' }